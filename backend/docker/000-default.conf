# __PORT__ is replaced with Railway's $PORT by entrypoint.sh.
<VirtualHost *:__PORT__>
    DocumentRoot /var/www/html/webroot

    <Directory /var/www/html/webroot>
        AllowOverride All
        Require all granted
    </Directory>

    # Stream logs to the container's stdout/stderr so Railway captures them.
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
